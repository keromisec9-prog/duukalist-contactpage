<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — DuukaList+</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d0d0d;
        color: #f2f2f2;
    }

    header {
        padding: 20px;
        text-align: center;
        background: #111;
        font-size: 22px;
        letter-spacing: 1px;
        border-bottom: 1px solid #222;
    }

    .container {
        max-width: 500px;
        margin: 50px auto;
        padding: 20px;
    }

    h2 {
        margin-bottom: 10px;
        font-weight: normal;
        text-align: center;
    }

    p {
        text-align: center;
        color: #ccc;
        margin-bottom: 30px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    input, textarea {
        padding: 12px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: #eee;
        border-radius: 6px;
        font-size: 15px;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: #444;
    }

    button {
        padding: 12px;
        background: #333;
        border: none;
        color: #fff;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #444;
    }

    /* Floating WhatsApp Button */
    .whatsapp-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 55px;
        height: 55px;
        background: #25D366;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        cursor: pointer;
        z-index: 1000;
    }

    .whatsapp-btn img {
        width: 32px;
        height: 32px;
    }

    footer {
        text-align: center;
        padding: 20px;
        margin-top: 60px;
        font-size: 14px;
        color: #777;
        background: #111;
        border-top: 1px solid #222;
    }
</style>
</head>

<body>

<header>DuukaList+ — Contact Us</header>

<div class="container">
    <h2>Get in Touch</h2>
    <p>Use the form below to send us a message. We’ll get back to you shortly.</p>

    <form action="https://formspree.io/f/mbddanjz" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

<!-- WhatsApp Floating Button -->
<a class="whatsapp-btn" href="https://wa.me/256767772898" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<footer>
    © 2025 DuukaList+. All rights reserved.
</footer>

</body>
</html>
